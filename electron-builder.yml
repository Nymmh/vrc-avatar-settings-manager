appId: com.nymh.avatarsettingsmanager
productName: VRC Avatar Settings Manager
directories:
  buildResources: build
copyright: Copyright © 2025 ${author}
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!**/*.{heapsnapshot,heapprofile}'
  - '!**/*.map'
  - '!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}'
  - '!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}'
  - '!**/node_modules/*.d.ts'
  - '!**/node_modules/.bin'
  - '!**/*.{iml,o,hprof,orig,pyc,pyo,rbc,swp,csproj,sln,xproj}'
  - '!.editorconfig'
  - '!**/._*'
  - '!**/{.DS_Store,.git,.hg,.svn,CVS,RCS,SCCS,.gitignore,.gitattributes}'
  - '!**/{__pycache__,thumbs.db,.flowconfig,.idea,.vs,.nyc_output}'
  - '!**/{appveyor.yml,.travis.yml,circle.yml}'
  - '!**/{npm-debug.log,yarn.lock,.yarn-integrity,.yarn-metadata.json}'
asarUnpack:
  - '**/node_modules/better-sqlite3/build/**/*'
electronLanguages:
  - en-US
win:
  executableName: VRC Avatar Settings Manager
  publish: github
  target: nsis
nsis:
  artifactName: ${productName} ${version} setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: false
  allowToChangeInstallationDirectory: true
  oneClick: false
  perMachine: true
  license: README/terms.txt
  installerSidebar: build/sidebar.bmp
  uninstallerSidebar: build/sidebar.bmp
  installerLanguages:
    - en-US
  deleteAppDataOnUninstall: true
  include: build/installer.nsh
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: Nymh
  category: Utility
appImage:
  artifactName: ${productName} ${version}.${ext}
npmRebuild: false
asar: true
compression: maximum
removePackageScripts: true
nodeGypRebuild: false
buildDependenciesFromSource: false
publish:
  provider: generic
  url: https://github.com/Nymmh/vrc-avatar-settings-manager/releases/download/latest/
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
